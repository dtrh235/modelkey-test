<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>临时密码 — Joyful Zone</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="shared.js"></script>
  <script>tailwind.config = jzTailwindConfig();</script>
</head>
<body>
<script>
document.addEventListener('DOMContentLoaded', () => {
  let timer = null;
  let activeList = [];

  function tpSignature(list) {
    return jzListSignature(list, (t) => `${t.id}:${t.used ? 1 : 0}:${t.expiresAt}`);
  }

  function renderList() {
    const list = document.getElementById('tpList');
    if (!list) return;
    if (activeList.length === 0) {
      list.innerHTML = '<p class="text-center text-sm text-slate-400 py-8">暂无有效临时密码</p>';
      return;
    }
    list.innerHTML = activeList.map((t) => `
      <div class="bg-white rounded-2xl p-4 shadow-card border border-slate-50 mb-3" data-tp="${t.id}">
        <div class="flex justify-between items-center mb-2">
          <span class="text-xs text-ycu-teal-dark font-semibold">有效</span>
          <span class="text-sm font-mono font-bold text-ycu-sun tp-countdown" data-exp="${t.expiresAt}">--:--</span>
        </div>
        <div class="grid grid-cols-2 gap-2 text-sm">
          <div class="bg-ycu-surface rounded-xl p-2.5"><p class="text-xs text-slate-400">账号</p><p class="font-mono font-bold text-ycu-navy tracking-wider">${t.account}</p></div>
          <div class="bg-ycu-surface rounded-xl p-2.5"><p class="text-xs text-slate-400">密码</p><p class="font-mono font-bold text-ycu-navy tracking-wider">${t.password}</p></div>
        </div>
        <div class="flex gap-2 mt-3">
          <button type="button" class="tp-copy flex-1 py-2 rounded-xl bg-ycu-teal-light text-ycu-teal-dark text-xs font-semibold" data-acc="${t.account}" data-pwd="${t.password}">复制发给访客</button>
          <button type="button" class="tp-revoke py-2 px-3 rounded-xl text-ycu-sun text-xs border border-orange-100" data-id="${t.id}">作废</button>
        </div>
      </div>`).join('');

    list.querySelectorAll('.tp-copy').forEach((btn) => {
      btn.onclick = () => jzCopyText(`账号 ${btn.dataset.acc}，密码 ${btn.dataset.pwd}`);
    });
    list.querySelectorAll('.tp-revoke').forEach((btn) => {
      btn.onclick = async () => {
        const r = await jzRevokeTempPassword(btn.dataset.id);
        if (r.ok) {
          await refreshList(true);
          showToast('已作废', 'info');
        }
      };
    });
    tickCountdowns();
  }

  function tickCountdowns() {
    document.querySelectorAll('.tp-countdown').forEach((el) => {
      el.textContent = jzFormatCountdown(+el.dataset.exp - Date.now());
    });
  }

  async function refreshList(force = false) {
    const next = await jzFetchTempPasswords();
    if (!force && tpSignature(next) === tpSignature(activeList)) {
      return false;
    }
    activeList = next;
    jzSaveSettings({ tempPasswords: activeList });
    renderList();
    return true;
  }

  initSettingsPage('临时密码', 'profile.html', `
    <div class="bg-gradient-to-br from-ycu-teal-light to-white rounded-2xl p-4 border border-ycu-teal/15 shadow-card">
      <h3 class="font-semibold text-ycu-navy">访客临时通行</h3>
      ${renderPageDesc('生成数字账号和密码，发给访客在门锁键盘输入即可开门。')}
      <button type="button" id="genTp" class="w-full mt-4 py-3.5 rounded-xl bg-gradient-to-r from-ycu-teal to-ycu-teal-dark text-white font-semibold shadow-card">
        <i class="fa-solid fa-wand-magic-sparkles mr-1"></i> 生成临时密码
      </button>
      ${renderHint('5 分钟内有效，仅可使用一次', true)}
    </div>
    ${renderSectionLabel('当前有效')}
    <div id="tpList"></div>
  `);

  refreshList(true);

  timer = setInterval(() => {
    tickCountdowns();
    const before = activeList.length;
    activeList = activeList.filter((t) => t.expiresAt > Date.now() && !t.used);
    if (activeList.length !== before) {
      renderList();
    }
  }, 1000);

  window.addEventListener('jz-temp-passwords-changed', (e) => {
    activeList = Array.isArray(e.detail?.items) ? e.detail.items : [];
    jzSaveSettings({ tempPasswords: activeList });
    renderList();
  });

  jzWatchPageRefresh({
    onResume: () => refreshList(true),
    pollMs: 2000,
    onPoll: () => refreshList(false),
    onBindChange: (d) => {
      if (!d.bound) {
        activeList = [];
        jzSaveSettings({ tempPasswords: [] });
        renderList();
        showToast('设备已断开，临时密码列表已清空', 'info');
        return;
      }
      if (d.tempPasswordsChanged) {
        refreshList(true);
      }
    },
  });

  document.getElementById('genTp').onclick = async () => {
    const btn = document.getElementById('genTp');
    btn.disabled = true;
    const r = await jzCreateTempPassword();
    btn.disabled = false;
    if (!r.ok || !r.tempPassword) return;
    await refreshList(true);
    showToast('已生成并下发门锁');
    jzCopyText(`账号 ${r.tempPassword.account}，密码 ${r.tempPassword.password}`);
  };

  window.addEventListener('beforeunload', () => clearInterval(timer));
});
</script>
</body>
</html>
