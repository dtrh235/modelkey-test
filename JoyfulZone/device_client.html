<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>侧门读卡器 — Joyful Zone</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="shared.js"></script>
  <script>tailwind.config = jzTailwindConfig();</script>
</head>
<body>
<script>
initSettingsPage('侧门读卡器', 'device_detail.html', `
  <div class="bg-white rounded-2xl p-4 shadow-card border border-ycu-blue/10 flex gap-4">
    <div class="w-20 h-20 rounded-xl bg-gradient-to-br from-ycu-blue/20 to-ycu-teal-light flex items-center justify-center flex-shrink-0">
      <i class="fa-solid fa-microchip text-3xl text-ycu-blue"></i>
    </div>
    <div>
      <p class="font-bold text-ycu-navy">侧门入口</p>
      <p class="text-sm text-emerald-600 mt-1"><i class="fa-solid fa-circle text-[6px] mr-1"></i>在线</p>
      <p class="text-sm text-slate-400 mt-2">固件 v2.4.0</p>
    </div>
  </div>
  ${renderSettingsGroup([
    ['#','fa-nfc-symbol','刷卡开锁','将卡片贴近读卡区',null],
    ['#','fa-fingerprint','指纹验证','按压指纹传感器',null],
  ])}
  ${renderHint('用户权限由门锁主屏统一管理。', true)}
`);
</script>
</body>
</html>
