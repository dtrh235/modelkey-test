<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>添加设备 — Joyful Zone</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="shared.js"></script>
  <script>tailwind.config = jzTailwindConfig();</script>
</head>
<body>
<script>
initSettingsPage('添加设备', 'devices.html', `
  <div class="bg-white rounded-2xl p-6 shadow-card text-center border border-ycu-teal/10">
    <img src="${JZ_IMG.lockRemote}" class="w-full max-w-[200px] h-36 mx-auto object-cover rounded-2xl mb-4 shadow-card" alt="智能门锁"
      onerror="this.onerror=null;this.src='${JZ_IMG.lock}'">
    <p class="text-sm text-ycu-navy font-medium">输入门锁上的 6 位配对码</p>
    ${renderHint('门锁：账号管理 → 6.App配对 可查看配对码', true)}
  </div>
  <input id="pair-code-input" type="tel" maxlength="6" inputmode="numeric" pattern="[0-9]*"
    class="w-full px-4 py-3 rounded-xl border border-slate-200 text-2xl font-mono text-center tracking-[0.35em]"
    placeholder="000000">
  <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100 text-left space-y-2">
    <p class="text-xs text-slate-500 font-medium">后端地址（手机需与电脑同一 WiFi）</p>
    <input id="api-base-input" type="url" inputmode="url" autocomplete="off"
      class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm font-mono"
      placeholder="http://192.168.x.x:3000">
    <button type="button" id="api-test-btn"
      class="w-full py-2 rounded-xl border border-ycu-teal/30 text-ycu-teal text-sm font-medium">测试后端连接</button>
    <p id="api-test-hint" class="text-xs text-slate-400 hidden"></p>
  </div>
  <button type="button" id="bind-submit" class="block w-full py-3.5 rounded-2xl bg-gradient-to-r from-ycu-teal to-ycu-teal-dark text-white text-center font-semibold shadow-card">绑定设备</button>
`);
const apiInput = document.getElementById('api-base-input');
apiInput.value = jzApiBase();
apiInput.addEventListener('change', () => jzSaveApiBase(apiInput.value));
document.getElementById('api-test-btn').addEventListener('click', async () => {
  const hint = document.getElementById('api-test-hint');
  const base = jzSaveApiBase(apiInput.value);
  hint.classList.remove('hidden');
  hint.textContent = '正在连接…';
  hint.className = 'text-xs text-slate-500';
  try {
    const r = await jzPingApiBase(base);
    if (r.ok && r.data.mqttConnected) {
      hint.textContent = `已连接 ${base}（MQTT 正常）`;
      hint.className = 'text-xs text-emerald-600';
      showToast('后端连接成功');
    } else if (r.ok) {
      hint.textContent = `已连接 ${base}，但 MQTT 未就绪`;
      hint.className = 'text-xs text-amber-600';
    } else {
      hint.textContent = `连接失败：${base}`;
      hint.className = 'text-xs text-red-500';
    }
  } catch {
    hint.textContent = `无法访问 ${base}，请检查 server 是否启动、防火墙是否放行 3000 端口`;
    hint.className = 'text-xs text-red-500';
  }
});
document.getElementById('bind-submit').addEventListener('click', async () => {
  jzSaveApiBase(apiInput.value);
  const code = document.getElementById('pair-code-input').value;
  if (await jzBindWithPairCode(code)) {
    location.href = jzHref('device_detail.html', 'add_device');
  }
});
</script>
</body>
</html>
