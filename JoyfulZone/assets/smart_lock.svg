<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8FAF7"/>
      <stop offset="100%" stop-color="#D4F0EC"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A5568"/>
      <stop offset="100%" stop-color="#2D3748"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3ECFB4"/>
      <stop offset="100%" stop-color="#2DB8A8"/>
    </linearGradient>
  </defs>
  <rect width="400" height="280" fill="url(#bg)"/>
  <!-- 门框 -->
  <rect x="60" y="20" width="280" height="240" rx="12" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="3"/>
  <!-- 锁体 -->
  <rect x="130" y="50" width="140" height="200" rx="16" fill="url(#body)" stroke="#1E293B" stroke-width="2"/>
  <!-- 触摸屏 -->
  <rect x="145" y="65" width="110" height="90" rx="8" fill="url(#screen)"/>
  <text x="200" y="108" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14" font-weight="600">Joyful</text>
  <text x="200" y="128" text-anchor="middle" fill="white" font-family="sans-serif" font-size="11" opacity="0.9">Zone</text>
  <!-- 数字键盘示意 -->
  <g fill="#94A3B8" opacity="0.9">
    <circle cx="165" cy="175" r="8"/><circle cx="200" cy="175" r="8"/><circle cx="235" cy="175" r="8"/>
    <circle cx="165" cy="205" r="8"/><circle cx="200" cy="205" r="8"/><circle cx="235" cy="205" r="8"/>
    <circle cx="200" cy="235" r="8"/>
  </g>
  <!-- NFC 感应区 -->
  <rect x="155" y="168" width="90" height="28" rx="14" fill="none" stroke="#3ECFB4" stroke-width="2" stroke-dasharray="4 3" opacity="0.8"/>
  <text x="200" y="186" text-anchor="middle" fill="#3ECFB4" font-family="sans-serif" font-size="9">NFC</text>
  <!-- 指纹模块示意 (右侧) -->
  <circle cx="295" cy="160" r="22" fill="#1E293B" stroke="#64748B" stroke-width="2"/>
  <circle cx="295" cy="160" r="14" fill="none" stroke="#3ECFB4" stroke-width="2"/>
  <path d="M295 148c-6 0-10 4-10 8 0 6 10 14 10 14s10-8 10-14c0-4-4-8-10-8z" fill="#3ECFB4" opacity="0.5"/>
  <!-- 门把手 -->
  <rect x="310" y="120" width="12" height="80" rx="6" fill="#64748B"/>
  <circle cx="316" cy="160" r="18" fill="none" stroke="#94A3B8" stroke-width="4"/>
</svg>
