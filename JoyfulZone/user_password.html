<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>更改开门密码 — Joyful Zone</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="shared.js"></script>
  <script>tailwind.config = jzTailwindConfig();</script>
</head>
<body>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const id = jzQuery('id') || '';
  const accQ = jzQuery('acc') || '';
  let u = jzGetUser(id) || (accQ ? jzGetUser(accQ) : null);
  if (!u) {
    const list = await jzFetchUsers({ network: true });
    u = list.find((x) => String(x.id) === String(id) || String(x.acc) === String(accQ)) || null;
  }
  if (!u) {
    showToast('用户不存在', 'error');
    setTimeout(() => { location.replace('users.html'); }, 600);
    return;
  }

  const userRef = { id: u.id, acc: u.acc, isAdmin: !!u.isAdmin };
  const needsOldPwd = jzUserIsAdmin(u);
  const backUrl = `user_detail.html?id=${encodeURIComponent(userRef.id)}`;
  const oldPwdBlock = needsOldPwd
    ? `<div>
        <label class="text-sm font-medium text-slate-600">原开门密码</label>
        <input id="pwdOld" type="password" inputmode="numeric" pattern="\\d*" maxlength="10"
          class="w-full mt-1 px-3 py-2.5 rounded-xl border border-slate-200 text-sm font-mono outline-none focus:border-ycu-teal tracking-wider"
          placeholder="请输入当前密码">
      </div>`
    : '';
  const hintText = needsOldPwd
    ? '管理员账号修改密码需验证原密码（与米家等智能锁 App 一致）。'
    : '由管理员重置开门密码，无需原密码。';

  initSettingsPage('更改开门密码', backUrl, `
    <div class="bg-white rounded-2xl p-4 shadow-card border border-slate-50 flex items-center gap-3">
      <div class="w-11 h-11 rounded-full bg-gradient-to-br from-ycu-teal to-ycu-blue text-white flex items-center justify-center font-bold text-xs font-mono">${jzUserAvatarText(u)}</div>
      <div>
        <p class="text-sm font-semibold text-ycu-navy font-mono tracking-wide">${u.acc}</p>
        <p class="text-xs text-slate-400 mt-0.5">${jzUserRoleLabel(u)}</p>
      </div>
    </div>
    ${renderPageDesc('新密码将同步到门锁，用户可用键盘输入账号+密码开门。')}
    <div class="bg-white rounded-2xl p-4 shadow-card space-y-4 border border-slate-50">
      ${oldPwdBlock}
      <div>
        <label class="text-sm font-medium text-slate-600">新密码</label>
        <input id="pwdNew" type="password" inputmode="numeric" pattern="\\d*" maxlength="10"
          class="w-full mt-1 px-3 py-2.5 rounded-xl border border-slate-200 text-sm font-mono outline-none focus:border-ycu-teal tracking-wider"
          placeholder="4-10 位数字">
      </div>
      <div>
        <label class="text-sm font-medium text-slate-600">确认密码</label>
        <input id="pwdConfirm" type="password" inputmode="numeric" pattern="\\d*" maxlength="10"
          class="w-full mt-1 px-3 py-2.5 rounded-xl border border-slate-200 text-sm font-mono outline-none focus:border-ycu-teal tracking-wider"
          placeholder="再次输入">
      </div>
    </div>
    ${renderHint(hintText)}
    <button type="button" id="savePwd" class="w-full py-3.5 rounded-2xl bg-gradient-to-r from-ycu-teal to-ycu-teal-dark text-white font-semibold shadow-card">保存密码</button>
  `, { backAnchor: 'fixed' });

  document.getElementById('savePwd').onclick = async () => {
    const oldPwd = needsOldPwd ? document.getElementById('pwdOld').value.trim() : '';
    const pwd = document.getElementById('pwdNew').value.trim();
    const confirm = document.getElementById('pwdConfirm').value.trim();
    if (needsOldPwd) {
      if (!jzIsNumericCred(oldPwd, JZ_CRED.PWD_MIN_LEN, JZ_CRED.PWD_MAX_LEN)) {
        showToast('请输入原开门密码', 'error');
        return;
      }
    }
    if (!jzIsNumericCred(pwd, JZ_CRED.PWD_MIN_LEN, JZ_CRED.PWD_MAX_LEN)) {
      showToast('密码须为 4-10 位数字', 'error');
      return;
    }
    if (pwd !== confirm) {
      showToast('两次输入不一致', 'error');
      return;
    }
    if (needsOldPwd && pwd === oldPwd) {
      showToast('新密码不能与原密码相同', 'error');
      return;
    }
    const btn = document.getElementById('savePwd');
    btn.disabled = true;
    btn.textContent = '正在同步门锁…';
    const res = await jzUpdateUserPassword(userRef.acc, pwd, needsOldPwd ? oldPwd : undefined);
    btn.disabled = false;
    btn.textContent = '保存密码';
    if (!res.ok) return;
    showToast('开门密码已更新');
    setTimeout(() => { location.replace(backUrl); }, 600);
  };
});
</script>
</body>
</html>
